name: Xior deep monitor (Playwright)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: xior-deep-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements_deep.txt

      - run: python -m playwright install --with-deps chromium

      - env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python deep_monitor.py

      - name: Commit state
        run: |
          git config user.name  "xior-monitor-bot"
          git config user.email "xior-monitor-bot@users.noreply.github.com"
          git add deep_state.json deep_failures.json
          if ! git diff --cached --quiet; then
            git commit -m "deep state: $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          else
            echo "no state change"
          fi
